services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: approval_workflow
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d approval_workflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/approval_workflow
      DB_USERNAME: app_user
      DB_PASSWORD: app_secret
    ports:
      - "8080:8080"

volumes:
  pgdata:
